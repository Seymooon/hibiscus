<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>For You</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Inter, sans-serif;
  }

  body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #ffeaf2;
  }

  /* 🌸 cinematic background */
  .bg {
    position: fixed;
    inset: -60%;
    background:
      radial-gradient(circle at 25% 30%, #ffb6c855, transparent 45%),
      radial-gradient(circle at 75% 70%, #ff8fb155, transparent 50%),
      radial-gradient(circle at 50% 50%, #ffd6e655, transparent 60%);
    filter: blur(90px);
    z-index: -3;
  }

  /* 🌺 floating flowers */
  .flower {
    position: fixed;
    width: 26px;
    height: 26px;
    pointer-events: none;
    opacity: 0.18;
    z-index: -2;
  }

  /* CENTER WRAP (iPhone 11 Pro Max optimized) */
  .wrap {
    text-align: center;
    transform: scale(1);
    max-width: 420px;
    padding: 20px;
  }

  #msg {
    font-size: 26px;
    font-weight: 500;
    color: #b0124a;
    margin-bottom: 12px;
  }

  .sub {
    font-size: 14px;
    color: #7a4a5a;
    margin-bottom: 22px;
  }

  /* GRID (slightly larger for Pro Max) */
  .grid {
    display: grid;
    grid-template-columns: repeat(4, 78px);
    grid-template-rows: repeat(4, 78px);
    gap: 12px;
    justify-content: center;
  }

  .grid.hide {
    opacity: 0;
    pointer-events: none;
    transition: 1s ease;
  }

  .tile {
    width: 78px;
    height: 78px;
    border-radius: 16px;
    background: #fff0f5;
    cursor: pointer;
    position: relative;
    transition: 0.8s ease;
    overflow: hidden;
  }

  .tile.active {
    background: #ff6fae;
  }

  .tile.active::after {
    content: "🌺";
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
  }

  /* FINAL SCREEN (IMPORTANT FIX) */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(255, 240, 245, 0.94);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: 1.5s ease;
    z-index: 20;
  }

  .overlay.show {
    opacity: 1;
  }

  .final {
    font-size: 42px;
    font-weight: 600;
    color: #b0124a;
    text-align: center;
    z-index: 30;
  }

  /* FINAL FLOWERS LAYER */
  #finalFlowers {
    position: fixed;
    inset: 0;
    pointer-events: none;
    display: none;
    z-index: 10;
  }

  .final-flower {
    position: absolute;
    font-size: 22px;
  }
</style>
</head>

<body>

<div class="bg"></div>

<div class="wrap">
  <div id="msg">you feel like home in ways i can’t explain</div>
  <div class="sub">tap the moments</div>

  <div class="grid" id="grid"></div>
</div>

<div class="overlay" id="overlay">
  <div class="final">I LOVE YOU SO MUCH</div>
</div>

<div id="finalFlowers"></div>

<script>

/* TEXT LOOP */
const messages = [
  "you feel like home in ways i can’t explain",
  "i notice you in everything i do",
  "you became my quiet place",
  "loving you feels natural",
  "i choose you always"
]

let i = 0
const msg = document.getElementById("msg")

setInterval(() => {
  i = (i + 1) % messages.length
  msg.textContent = messages[i]
}, 3000)

/* BACKGROUND FLOWERS */
function bgFlower() {
  const f = document.createElement("div")
  f.className = "flower"
  f.textContent = "🌺"

  f.style.left = Math.random() * 100 + "vw"
  f.style.top = "100vh"

  document.body.appendChild(f)

  let y = 100
  const speed = 0.4 + Math.random()

  function move() {
    y -= speed
    f.style.top = y + "vh"
    if (y < -10) f.remove()
    else requestAnimationFrame(move)
  }

  move()
}

setInterval(bgFlower, 250)

/* FINAL FLOWERS */
const finalFlowers = document.getElementById("finalFlowers")

function spawnFinalFlower() {
  const f = document.createElement("div")
  f.className = "final-flower"
  f.textContent = "🌺"

  f.style.left = Math.random() * 100 + "vw"
  f.style.top = Math.random() * 100 + "vh"

  finalFlowers.appendChild(f)
}

/* GRID */
const grid = document.getElementById("grid")
const overlay = document.getElementById("overlay")

let count = 0
const total = 16

for (let i = 0; i < total; i++) {
  const tile = document.createElement("div")
  tile.className = "tile"

  tile.onclick = () => {
    if (tile.classList.contains("active")) return

    tile.classList.add("active")
    count++

    if (count === total) {
      grid.classList.add("hide")
      overlay.classList.add("show")

      finalFlowers.style.display = "block"

      for (let i = 0; i < 140; i++) {
        setTimeout(() => spawnFinalFlower(), i * 12)
      }
    }
  }

  grid.appendChild(tile)
}
</script>

</body>
</html>
